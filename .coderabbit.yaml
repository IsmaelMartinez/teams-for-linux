language: en
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false
  path_filters:
    - "!docs-site/static/**"
    - "!**/*.png"
    - "!**/*.ico"
    - "!**/*.svg"
    - "!**/*.woff2"
    - "!**/package-lock.json"
  tools:
    eslint:
      enabled: true
chat:
  auto_reply: true
