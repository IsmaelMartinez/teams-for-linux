<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teams for Linux - Screen Share Preview</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-sizing: border-box;
        }

        #screen-share-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #000;
        }

        .status-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 4px 8px;
            font-size: 12px;
            text-align: center;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="status-overlay">Screen Share Preview</div>
    <video id="screen-share-video" autoplay muted></video>

    <script>
        // #2534: the preview no longer re-captures the screen via getUserMedia.
        // Instead, the main process posts a MessagePort to this window over
        // the 'screen-share-port' channel; the Teams renderer pumps VideoFrames
        // through it from the already-captured screen-share track. We rebuild
        // the stream on this side with MediaStreamTrackGenerator. Single capture,
        // no second portal prompt on Wayland.
        globalThis.addEventListener('DOMContentLoaded', () => {
            const videoElement = document.getElementById('screen-share-video');
            const statusOverlay = document.querySelector('.status-overlay');

            statusOverlay.textContent = 'Screen Share Active';
            document.title = 'Teams for Linux - Screen is being shared';

            let writer = null;
            let resizeApplied = false;

            videoElement.addEventListener('loadedmetadata', () => {
                if (resizeApplied) return;
                const videoWidth = videoElement.videoWidth;
                const videoHeight = videoElement.videoHeight;
                if (!videoWidth || !videoHeight) return;
                resizeApplied = true;

                const maxWidth = 400;
                const maxHeight = 300;
                const aspectRatio = videoWidth / videoHeight;
                let windowWidth, windowHeight;
                if (aspectRatio > maxWidth / maxHeight) {
                    windowWidth = maxWidth;
                    windowHeight = maxWidth / aspectRatio;
                } else {
                    windowHeight = maxHeight;
                    windowWidth = maxHeight * aspectRatio;
                }
                windowWidth = Math.max(windowWidth, 200);
                windowHeight = Math.max(windowHeight, 120) + 20;

                if (globalThis.electronAPI?.resizeWindow) {
                    globalThis.electronAPI.resizeWindow({
                        width: Math.round(windowWidth),
                        height: Math.round(windowHeight),
                    });
                }
            });

            const wirePort = (port) => {
                if (typeof MediaStreamTrackGenerator === 'undefined') {
                    statusOverlay.textContent = 'MediaStreamTrackGenerator unavailable';
                    return;
                }
                // Defensively tear down a prior writer if wirePort fires twice
                // (e.g. Teams "Change what's shared" mid-session): close the
                // previous writable to release the old generator and reset the
                // resize guard so the new track can re-fit the window.
                if (writer) {
                    try { writer.close(); } catch { /* noop */ }
                    writer = null;
                }
                resizeApplied = false;

                const generator = new MediaStreamTrackGenerator({ kind: 'video' });
                writer = generator.writable.getWriter();
                videoElement.srcObject = new MediaStream([generator]);

                port.onmessage = async (event) => {
                    const frame = event.data;
                    if (!frame) return;
                    try {
                        await writer.write(frame);
                    } catch (error) {
                        console.error('Preview frame write failed', error);
                        try { frame.close?.(); } catch { /* noop */ }
                    }
                };

                port.onmessageerror = (error) => {
                    console.error('Preview port message error', error);
                };

                port.start?.();
            };

            // The preload forwards the MessagePort from main via window.postMessage
            // with transfer; pick it up here once. See app/screenSharing/previewWindowPreload.js.
            window.addEventListener('message', (event) => {
                if (event.source !== window) return;
                if (event.data !== 'screen-share-port') return;
                const port = event.ports?.[0];
                if (port) wirePort(port);
            });

            if (globalThis.electronAPI?.onScreenSharingStatusChanged) {
                globalThis.electronAPI.onScreenSharingStatusChanged(async () => {
                    const isActive = await globalThis.electronAPI.getScreenSharingStatus();
                    if (!isActive) {
                        statusOverlay.textContent = 'Screen Share Inactive';
                        document.title = 'Teams for Linux - Nothing is being shared';
                        if (writer) {
                            try { await writer.close(); } catch { /* noop */ }
                            writer = null;
                        }
                        videoElement.srcObject = null;
                    }
                });
            }
        });
    </script>
</body>
</html>
