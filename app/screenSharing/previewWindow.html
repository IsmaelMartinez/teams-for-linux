<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teams for Linux - Screen Share Preview</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-sizing: border-box;
        }

        #screen-share-canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #000;
            display: block;
        }

        .status-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 4px 8px;
            font-size: 12px;
            text-align: center;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="status-overlay">Screen Share Preview</div>
    <canvas id="screen-share-canvas"></canvas>

    <script>
        // #2534: the preview no longer re-captures the screen via getUserMedia.
        // Instead, the Teams renderer takes periodic snapshots of the captured
        // screen-share track, transfers each snapshot as an ImageBitmap over a
        // MessagePort, and we paint it onto the canvas here. ImageBitmap (unlike
        // VideoFrame) survives cross-process transfer cleanly. Single capture,
        // no second portal prompt on Wayland.
        globalThis.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('screen-share-canvas');
            const statusOverlay = document.querySelector('.status-overlay');

            statusOverlay.textContent = 'Screen Share Active';
            document.title = 'Teams for Linux - Screen is being shared';

            let bitmapCtx = null;
            try {
                bitmapCtx = canvas.getContext('bitmaprenderer');
            } catch (error) {
                statusOverlay.textContent = 'ImageBitmap render context unavailable';
                console.error('Failed to acquire bitmaprenderer context', error);
            }

            let port = null;
            let resizeApplied = false;

            const applyResize = (bitmap) => {
                if (resizeApplied) return;
                resizeApplied = true;
                canvas.width = bitmap.width;
                canvas.height = bitmap.height;

                const maxWidth = 400;
                const maxHeight = 300;
                const aspectRatio = bitmap.width / bitmap.height;
                let windowWidth, windowHeight;
                if (aspectRatio > maxWidth / maxHeight) {
                    windowWidth = maxWidth;
                    windowHeight = maxWidth / aspectRatio;
                } else {
                    windowHeight = maxHeight;
                    windowWidth = maxHeight * aspectRatio;
                }
                windowWidth = Math.max(windowWidth, 200);
                windowHeight = Math.max(windowHeight, 120) + 20;

                if (globalThis.electronAPI?.resizeWindow) {
                    globalThis.electronAPI.resizeWindow({
                        width: Math.round(windowWidth),
                        height: Math.round(windowHeight),
                    });
                }
            };

            const wirePort = (received) => {
                if (!bitmapCtx) return;
                // Defensively close any prior port; a second wire-up means a
                // mid-session "Change what's shared" or a second share session.
                if (port) {
                    try { port.close(); } catch { /* noop */ }
                    port = null;
                }
                resizeApplied = false;
                port = received;
                port.onmessage = (event) => {
                    const bitmap = event.data;
                    if (!(bitmap instanceof ImageBitmap)) {
                        console.warn('Preview received non-ImageBitmap payload', bitmap);
                        return;
                    }
                    applyResize(bitmap);
                    try {
                        bitmapCtx.transferFromImageBitmap(bitmap);
                    } catch (error) {
                        console.error('Preview bitmap render failed', error);
                        try { bitmap.close?.(); } catch { /* noop */ }
                    }
                };
                port.onmessageerror = (event) => {
                    console.error('Preview port message error', event);
                };
                port.start?.();
            };

            // The preload forwards the MessagePort from main via window.postMessage
            // with transfer; pick it up once. See app/screenSharing/previewWindowPreload.js.
            window.addEventListener('message', (event) => {
                if (event.source !== window) return;
                if (event.data !== 'screen-share-port') return;
                const received = event.ports?.[0];
                if (received) wirePort(received);
            });

            if (globalThis.electronAPI?.onScreenSharingStatusChanged) {
                globalThis.electronAPI.onScreenSharingStatusChanged(async () => {
                    const isActive = await globalThis.electronAPI.getScreenSharingStatus();
                    if (!isActive) {
                        statusOverlay.textContent = 'Screen Share Inactive';
                        document.title = 'Teams for Linux - Nothing is being shared';
                        if (port) {
                            try { port.close(); } catch { /* noop */ }
                            port = null;
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
