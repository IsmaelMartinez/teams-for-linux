    <link rel="stylesheet" href="../assets/css/bootstrap-icons.css">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #1B1D24;
            margin: 0;
            padding: 10px 10px 15px 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            color: white;
        }

        header {
            display: flex;
            font-size: 13px;
        }

        header>span {
            margin-left: 10px;
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        main>div {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        main img {
            width: 100px;
            height: 100px;
            border-radius: 100%;
        }

        main p {
            text-align: center;
            font-size: 14px;
            margin: 0 0 5px 0;
        }

        footer {
            display: flex;
            justify-content: space-between;
        }

        footer button {
            transition: background-color 0.3s;
            margin: 0;
            padding: 0;
            font-size: 16px;
            color: white;
            border: none;
            border-radius: 3px;
            background-color: #4f52b2;
            min-width: 100px;
            min-height: 30px;
        }

        footer button:hover {
            background-color: #2f316c;
        }

        footer button.decline {
            background-color: #d13438;
        }

        footer button.decline:hover {
            background-color: #821d20;
        }

        footer button.decline>i::before {
            transform: rotate(135deg);
        }
    </style>
</head>

<body>
    <header>
        <img src="../assets/icons/icon-monochrome-light-16x16.png" alt="logo" /><span>Outlook for Linux</span>
    </header>
    <main>
        <div>
            <img id="image" src="" alt="">
        </div>
        <p id="caller"></p>
        <p id="text"></p>
    </main>
    <footer>
        <button class="button accept-video"><i class="bi bi-camera-video-fill"></i></button>
        <button class="button accept-audio"><i class="bi bi-telephone-fill"></i></button>
        <button class="button decline"><i class="bi bi-telephone-fill"></i></button>
    </footer>
    <script>
        document.body.addEventListener('click', (event) => {
            const button = event.target.closest('button');
            if (button) {
                button.blur();
                let action;
                if (button.classList.contains('accept-video')) {
                    action = 'ACCEPT_VIDEO';
                }
                if (button.classList.contains('accept-audio')) {
                    action = 'ACCEPT_AUDIO';
                }
                if (button.classList.contains('decline')) {
                    action = 'DECLINE';
                }
                if (action) {
                    globalThis.incomingCallApi.sendIncomingCallAction(action);
                }
            }
        });
    </script>
</body>

</html>
