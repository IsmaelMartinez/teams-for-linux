name: Snap Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# Restrict default permissions — each job declares only what it needs
permissions: {}

defaults:
  run:
    shell: bash

jobs:
  snap:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}
      SNAPCRAFT_BUILD_ENVIRONMENT: lxd

    steps:
      - name: Install Snapcraft
        uses: samuelmeuli/action-snapcraft@d33c176a9b784876d966f80fb1b461808edc0641 # v2.1.1

      - name: Install and initialize LXD
        uses: canonical/setup-lxd@da2ac84e727dc534215fd14cd088b9209d65893b # main

      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Node.js and NPM
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Build
        run: npm ci

      - name: Set edge version with commit SHA
        if: github.ref == 'refs/heads/main'
        run: |
          SHA=$(git rev-parse --short HEAD)
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version += '-edge.g${SHA}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Snap edge version: $(node -p "require('./package.json').version")"

      - name: Build for Release
        if: github.ref == 'refs/heads/main'
        run: npm run dist:linux:snap -- --publish always

      - name: Build for PR
        if: github.ref != 'refs/heads/main'
        run: npm run dist:linux:snap -- --publish never

      - name: Upload PR artifacts
        if: github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: teams-for-linux-snap-x64
          path: dist/*.snap
          retention-days: 30
          compression-level: 0

  snap-armv7l:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}
      # Note: No LXD - electron-builder handles armv7l cross-compilation directly

    steps:
      - name: Install Snapcraft
        uses: samuelmeuli/action-snapcraft@d33c176a9b784876d966f80fb1b461808edc0641 # v2.1.1

      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Node.js and NPM
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Build
        run: npm ci

      - name: Set edge version with commit SHA
        if: github.ref == 'refs/heads/main'
        run: |
          SHA=$(git rev-parse --short HEAD)
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version += '-edge.g${SHA}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Snap edge version: $(node -p "require('./package.json').version")"

      - name: Build for Release
        if: github.ref == 'refs/heads/main'
        run: npm run dist:linux:snap:armv7l -- --publish always

      - name: Build for PR
        if: github.ref != 'refs/heads/main'
        run: npm run dist:linux:snap:armv7l -- --publish never

      - name: Upload PR artifacts
        if: github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: teams-for-linux-snap-armv7l
          path: dist/*.snap
          retention-days: 30
          compression-level: 0

  snap-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read

    env:
      SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}
      SNAPCRAFT_BUILD_ENVIRONMENT: lxd

    steps:
      - name: Install Snapcraft
        # snapcraft 9.0.0 removed the legacy `snap` packing command that
        # electron-builder's deprecated core22 `snap` target invokes
        # (`snapcraft snap --output`), so the native-arm64 build fails. Pin
        # below 9.0.0 until the snap build migrates to the core24 `snapcraft`
        # target, which uses `snapcraft pack` (#2590, #2592). The amd64 and
        # armv7l jobs pack via app-builder directly and are unaffected.
        uses: samuelmeuli/action-snapcraft@d33c176a9b784876d966f80fb1b461808edc0641 # v2.1.1
        with:
          channel: 8.x/stable

      - name: Install and initialize LXD
        uses: canonical/setup-lxd@da2ac84e727dc534215fd14cd088b9209d65893b # main

      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Node.js and NPM
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Build
        run: npm ci

      - name: Set edge version with commit SHA
        if: github.ref == 'refs/heads/main'
        run: |
          SHA=$(git rev-parse --short HEAD)
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version += '-edge.g${SHA}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Snap edge version: $(node -p "require('./package.json').version")"

      - name: Build for Release
        if: github.ref == 'refs/heads/main'
        run: npm run dist:linux:snap:arm64 -- --publish always

      - name: Build for PR
        if: github.ref != 'refs/heads/main'
        run: npm run dist:linux:snap:arm64 -- --publish never

      - name: Upload PR artifacts
        if: github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: teams-for-linux-snap-arm64
          path: dist/*.snap
          retention-days: 30
          compression-level: 0

