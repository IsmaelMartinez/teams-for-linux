name: Cross-Distro Smoke Test

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro: [ubuntu, fedora, debian]
        display: [x11, wayland, xwayland]
    name: smoke (${{ matrix.distro }}, ${{ matrix.display }})

    steps:
      - name: Check out repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Resolve latest AppImage URL
        id: appimage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # gh CLI's release view returns .url as the browser download URL
          # (unlike the raw REST API, where .url is the API endpoint).
          URL=$(gh release view --repo IsmaelMartinez/teams-for-linux --json assets \
            --jq '.assets[] | select(.name | test("\\.AppImage$") and (test("-(arm64|armv7l)\\.AppImage$") | not)) | .url' | head -1)
          if [ -z "$URL" ]; then
            echo "::error::Could not resolve AppImage URL from latest release"
            exit 1
          fi
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "Resolved AppImage URL: ${URL}"

      - name: Build Docker image
        env:
          DISTRO: ${{ matrix.distro }}
        run: |
          docker build \
            -t "cross-distro-${DISTRO}" \
            -f "tests/cross-distro/dockerfiles/${DISTRO}.Dockerfile" \
            tests/cross-distro/

      - name: Start container
        env:
          DISTRO: ${{ matrix.distro }}
          DISPLAY_SERVER: ${{ matrix.display }}
          APP_URL: ${{ steps.appimage.outputs.url }}
        run: |
          docker run -d \
            --name "smoke-${DISTRO}-${DISPLAY_SERVER}" \
            --security-opt seccomp=unconfined \
            --cap-add SYS_PTRACE \
            --cap-add SYS_ADMIN \
            --cap-add SYS_NICE \
            --shm-size 4g \
            --platform linux/amd64 \
            -e "DISPLAY_SERVER=${DISPLAY_SERVER}" \
            -e "APP_URL=${APP_URL}" \
            -e AUTO_LAUNCH=true \
            -e SCREEN_RESOLUTION=1920x1080x24 \
            "cross-distro-${DISTRO}"

      - name: Run smoke check
        env:
          DISTRO: ${{ matrix.distro }}
          DISPLAY_SERVER: ${{ matrix.display }}
        run: |
          tests/cross-distro/scripts/smoke-check.sh \
            "smoke-${DISTRO}-${DISPLAY_SERVER}" 120

      - name: Write job summary
        if: always()
        env:
          DISTRO: ${{ matrix.distro }}
          DISPLAY_SERVER: ${{ matrix.display }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            ICON="pass"
          else
            ICON="FAIL"
          fi
          echo "| ${DISTRO} | ${DISPLAY_SERVER} | ${ICON} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Collect logs on failure
        if: failure()
        env:
          CONTAINER: smoke-${{ matrix.distro }}-${{ matrix.display }}
        run: |
          mkdir -p /tmp/smoke-logs
          docker logs "${CONTAINER}" \
            > /tmp/smoke-logs/container.log 2>&1 || true
          docker exec "${CONTAINER}" \
            cat /tmp/app.log > /tmp/smoke-logs/app.log 2>/dev/null || true

      - name: Upload log artifacts
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: smoke-logs-${{ matrix.distro }}-${{ matrix.display }}
          path: /tmp/smoke-logs/
          retention-days: 7

      - name: Cleanup container
        if: always()
        env:
          CONTAINER: smoke-${{ matrix.distro }}-${{ matrix.display }}
        run: |
          docker rm -f "${CONTAINER}" 2>/dev/null || true
