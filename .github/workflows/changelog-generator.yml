name: Generate Changelog Entry

# SECURITY NOTE: Using pull_request_target to enable commenting on external fork PRs.
# This trigger runs in the base repository context with full permissions.
# CRITICAL: We must NEVER checkout and execute code from forks with this trigger.
# The workflow only uses PR metadata (title, body) for Gemini API calls, which is safe.
# Checkout is only performed for internal PRs where head.repo == base.repo.

on:
  pull_request_target:
    types: [opened, synchronize, closed]
    branches: [main]

# Restrict default permissions — each job declares only what it needs
permissions: {}

jobs:
  generate-changelog:
    runs-on: ubuntu-latest
    # Skip changelog generation for release PRs
    if: ${{ github.event.action != 'closed' && !startsWith(github.event.pull_request.head.ref, 'release/') }}
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Detect fork status and check changelog existence
        id: setup
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const headRepo = context.payload.pull_request.head.repo.full_name;
            const baseRepo = context.payload.pull_request.base.repo.full_name;
            const isExternalFork = headRepo !== baseRepo;
            const prNumber = context.payload.pull_request.number;

            core.setOutput('is_external_fork', isExternalFork.toString());
            console.log(`Fork status: ${isExternalFork ? 'external fork' : 'internal'} (${headRepo} vs ${baseRepo})`);

            // Check if changelog already exists using GitHub API (safe - no code execution)
            // For external forks, we check their repo; for internal PRs, we check the base repo
            const repoOwner = context.payload.pull_request.head.repo.owner.login;
            const repoName = context.payload.pull_request.head.repo.name;

            try {
              await github.rest.repos.getContent({
                owner: repoOwner,
                repo: repoName,
                path: `.changelog/pr-${prNumber}.txt`,
                ref: context.payload.pull_request.head.sha
              });
              core.setOutput('changelog_exists', 'true');
              console.log('✅ Changelog file already exists, skipping generation');
            } catch (e) {
              if (e.status === 404) {
                core.setOutput('changelog_exists', 'false');
                console.log('📝 Changelog file not found, will generate');
              } else {
                // For other errors (e.g., rate limiting), log and continue
                console.log(`⚠️ Could not check changelog existence: ${e.message}`);
                core.setOutput('changelog_exists', 'false');
              }
            }

      # Only checkout for internal PRs where we need to commit the changelog
      # SECURITY: Never checkout external fork code with pull_request_target
      - name: Checkout PR branch (internal PRs only)
        if: steps.setup.outputs.is_external_fork == 'false' && steps.setup.outputs.changelog_exists == 'false'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate summary with Gemini
        if: steps.setup.outputs.changelog_exists == 'false'
        id: gemini
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const prTitle = context.payload.pull_request.title;
            const prBody = context.payload.pull_request.body || '';

            // Truncate body safely (first 1000 chars)
            const cleanBody = prBody.substring(0, 1000).replace(/"/g, "'");

            const prompt = `Summarize this PR in ONE concise line suitable for a changelog (max 80 chars):

            Title: ${prTitle}

            Description: ${cleanBody}

            Guidelines:
            - Start with action verb (Add/Fix/Update/Remove)
            - Focus on user-facing impact
            - Max 80 characters
            - Professional tone
            - Do NOT use backticks, markdown formatting, or code notation

            Example: "Add MQTT integration for Teams status publishing"`;

            try {
              const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${process.env.GEMINI_API_KEY}`,
                {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: {
                      temperature: 0.3,
                      maxOutputTokens: 256,
                      thinkingConfig: {
                        thinkingBudget: 0
                      }
                    }
                  })
                }
              );

              const data = await response.json();
              const summary = data.candidates[0].content.parts[0].text.trim();

              core.setOutput('summary', summary);
              console.log(`Generated: ${summary}`);
            } catch (error) {
              console.log(`Gemini API failed, using PR title as fallback`);
              core.setOutput('summary', prTitle);
            }

      - name: Post-process summary
        if: steps.setup.outputs.changelog_exists == 'false'
        id: final
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          GEMINI_SUMMARY: ${{ steps.gemini.outputs.summary }}
        with:
          script: |
            let summary = process.env.GEMINI_SUMMARY;
            const author = context.payload.pull_request.user.login;
            const prNum = context.payload.pull_request.number;

            // Add author if not a bot
            if (!author.includes('bot')) {
              summary = `${summary} - by @${author}`;
            }

            // Add PR number
            summary = `${summary} (#${prNum})`;

            // Fetch issues closed by this PR via GraphQL (REST doesn't expose closingIssuesReferences)
            const closingLines = [];
            try {
              const query = `query($owner: String!, $repo: String!, $prNum: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $prNum) {
                    closingIssuesReferences(first: 10) {
                      nodes { number title url }
                    }
                  }
                }
              }`;
              const result = await github.graphql(query, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                prNum: prNum
              });
              const issues = result.repository.pullRequest.closingIssuesReferences.nodes;
              for (const issue of issues) {
                closingLines.push(`closes: #${issue.number} ${issue.url} ${issue.title}`);
              }
              if (issues.length > 0) {
                console.log(`Linked issues: ${issues.map(i => '#' + i.number).join(', ')}`);
              }
            } catch (error) {
              console.log(`Could not fetch closing issues (non-fatal): ${error.message}`);
            }

            const fileContent = [summary, ...closingLines].join('\n');
            core.setOutput('final_summary', summary);
            core.setOutput('file_content', fileContent);
            console.log(`Final: ${fileContent}`);

      - name: Save changelog entry (internal PRs only)
        if: steps.setup.outputs.is_external_fork == 'false' && steps.setup.outputs.changelog_exists == 'false'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          FILE_CONTENT: ${{ steps.final.outputs.file_content }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const prNum = context.payload.pull_request.number;
            const filePath = path.join(process.env.GITHUB_WORKSPACE, '.changelog', `pr-${prNum}.txt`);
            fs.mkdirSync(path.dirname(filePath), { recursive: true });
            fs.writeFileSync(filePath, process.env.FILE_CONTENT + '\n');
            console.log(`✅ Created: .changelog/pr-${prNum}.txt`);
            console.log(process.env.FILE_CONTENT);

      - name: Commit changelog file to PR branch (internal PRs only)
        if: steps.setup.outputs.is_external_fork == 'false' && steps.setup.outputs.changelog_exists == 'false'
        env:
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b temp-changelog-branch
          git add .changelog/
          git commit -m "chore: add changelog entry for PR #${{ github.event.pull_request.number }}"
          git push origin "HEAD:${PR_BRANCH}"
          echo "✅ Changelog entry committed to PR branch"

      - name: Comment on PR (internal)
        if: steps.setup.outputs.is_external_fork == 'false' && steps.setup.outputs.changelog_exists == 'false'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          FINAL_SUMMARY: ${{ steps.final.outputs.final_summary }}
          PR_NUM: ${{ github.event.pull_request.number }}
        with:
          script: |
            const summary = process.env.FINAL_SUMMARY;
            const prNum = process.env.PR_NUM;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Changelog entry generated and committed to this PR:\n\n\`\`\`\n${summary}\n\`\`\`\n\nThe file \`.changelog/pr-${prNum}.txt\` will be included when you merge this PR.\n\nYou can edit it directly in this PR if needed.`
            })

      - name: Comment on PR (external fork)
        if: steps.setup.outputs.is_external_fork == 'true' && steps.setup.outputs.changelog_exists == 'false'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          FINAL_SUMMARY: ${{ steps.final.outputs.final_summary }}
        with:
          script: |
            const summary = process.env.FINAL_SUMMARY;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📝 **Changelog entry generated:**\n\n\`\`\`\n${summary}\n\`\`\`\n\nNo action needed — the changelog file will be created automatically when this PR is merged.\n\nIf you'd like to customise the entry, push a \`.changelog/pr-${context.payload.pull_request.number}.txt\` file to your branch and it will be used instead.`
            })

  # Auto-create changelog file on main when a fork PR is merged.
  # Since we cannot push to fork branches, this job commits the changelog
  # entry directly to main after merge using the GitHub Contents API.
  commit-fork-changelog:
    runs-on: ubuntu-latest
    if: >
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name &&
      !startsWith(github.event.pull_request.head.ref, 'release/')
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check if changelog already exists on main
        id: check
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            try {
              await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: `.changelog/pr-${prNumber}.txt`,
                ref: 'main'
              });
              core.setOutput('exists', 'true');
              console.log('Changelog already exists on main, skipping');
            } catch (e) {
              if (e.status === 404) {
                core.setOutput('exists', 'false');
                console.log('Changelog not found on main, will create');
              } else {
                throw new Error(`Failed to check changelog on main: ${e.status || 'unknown'} ${e.message}`);
              }
            }

      - name: Create changelog file on main
        if: steps.check.outputs.exists == 'false'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const prTitle = context.payload.pull_request.title;
            const author = context.payload.pull_request.user.login;

            // Try to extract summary from the bot's earlier changelog comment
            let summary;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100
            });

            const changelogComment = [...comments].reverse().find(c =>
              c.user?.login === 'github-actions[bot]' &&
              c.body?.includes('Changelog entry generated')
            );

            if (changelogComment) {
              const match = changelogComment.body.match(/```\n([\s\S]*?)\n```/);
              if (match) {
                summary = match[1].trim();
                console.log(`Extracted summary from bot comment: ${summary}`);
              }
            }

            // Fallback: build summary from PR title
            if (!summary) {
              summary = prTitle;
              if (!author.includes('bot')) {
                summary = `${summary} - by @${author}`;
              }
              summary = `${summary} (#${prNumber})`;
              console.log(`Fallback summary from PR title: ${summary}`);
            }

            // Fetch closing issues via GraphQL
            const closingLines = [];
            try {
              const query = `query($owner: String!, $repo: String!, $prNum: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $prNum) {
                    closingIssuesReferences(first: 10) {
                      nodes { number title url }
                    }
                  }
                }
              }`;
              const result = await github.graphql(query, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                prNum: prNumber
              });
              const issues = result.repository.pullRequest.closingIssuesReferences.nodes;
              for (const issue of issues) {
                closingLines.push(`closes: #${issue.number} ${issue.url} ${issue.title}`);
              }
            } catch (error) {
              console.log(`Could not fetch closing issues (non-fatal): ${error.message}`);
            }

            const fileContent = [summary, ...closingLines].join('\n') + '\n';

            // Commit file to main via Contents API
            const contentBase64 = Buffer.from(fileContent).toString('base64');
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: `.changelog/pr-${prNumber}.txt`,
              branch: 'main',
              message: `chore: add changelog entry for PR #${prNumber}`,
              content: contentBase64,
              committer: {
                name: 'github-actions[bot]',
                email: 'github-actions[bot]@users.noreply.github.com'
              }
            });

            console.log(`✅ Changelog committed to main: .changelog/pr-${prNumber}.txt`);
            console.log(fileContent);
