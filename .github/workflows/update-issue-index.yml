name: Update Issue Index

# Regenerates the issue-index.json file used by the issue triage bot (Phase 3)
# to detect potential duplicate issues. Fetches open issues and recently closed
# issues from the GitHub API and produces a compact JSON index.
#
# Triggers:
#   - Weekly full rebuild (Monday 4:00 UTC) as a safety net
#   - Real-time on issue state changes (opened, closed, reopened) so the
#     duplicate detector always has fresh data (Phase 3.1)
#   - Manual dispatch for testing
#
# See: docs-site/docs/development/research/github-issue-bot-investigation.md

on:
  schedule:
    - cron: '0 4 * * 1' # Weekly, Monday at 4:00 UTC
  issues:
    types: [opened, closed, reopened]
  workflow_dispatch: # Manual trigger for testing

# Only one index update at a time — if a new issue event arrives while the
# previous run is still going, cancel the older run to avoid conflicts.
concurrency:
  group: update-issue-index
  cancel-in-progress: true

# Restrict default permissions — each job declares only what it needs
permissions: {}

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '22'

      - name: Generate issue index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/issue-bot/scripts/generate-issue-index.js

      - name: Create PR if index changed
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
          commit-message: 'chore: update issue index for duplicate detection'
          title: 'chore: update issue index for duplicate detection'
          body: |
            Automated update of `.github/issue-bot/issue-index.json` for the
            triage bot's duplicate detection (Phase 3).
          branch: chore/update-issue-index
          add-paths: .github/issue-bot/issue-index.json
          delete-branch: true
