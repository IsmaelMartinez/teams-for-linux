name: Update Issue Index (Disabled)

# DISABLED: Migrated to standalone GitHub App at
# https://github.com/IsmaelMartinez/github-issue-triage-bot
# The standalone service manages its own issue index in Neon PostgreSQL.
# Safe to delete once the GitHub App is confirmed working.
#
# See: docs-site/docs/development/research/github-issue-bot-investigation.md

on:
  workflow_dispatch: # Keep manual trigger only, for emergency use

# Only one index update at a time — if a new issue event arrives while the
# previous run is still going, cancel the older run to avoid conflicts.
concurrency:
  group: update-issue-index
  cancel-in-progress: true

# Restrict default permissions — each job declares only what it needs
permissions: {}

jobs:
  update-index:
    # Disabled — migrated to GitHub App
    if: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '22'

      - name: Generate issue index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/issue-bot/scripts/generate-issue-index.js

      - name: Create PR if index changed
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
          commit-message: 'chore: update issue index for duplicate detection'
          title: 'chore: update issue index for duplicate detection'
          body: |
            Automated update of `.github/issue-bot/issue-index.json` for the
            triage bot's duplicate detection (Phase 3).
          branch: chore/update-issue-index
          add-paths: .github/issue-bot/issue-index.json
          delete-branch: true
