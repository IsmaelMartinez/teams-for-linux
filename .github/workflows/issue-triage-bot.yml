name: Issue Triage Bot

# Analyzes new bug reports and enhancement requests with AI-powered triage.
# Posts a single consolidated comment per issue.
# Phase 1: Missing info detection for bugs (v2.7.4)
# Phase 2: AI-powered solution suggestions for bugs via Gemini 2.5 Flash
# Phase 3: Duplicate detection against issue index via Gemini 2.5 Flash
# Phase 4: Enhancement context + feasibility, misclassification detection
# See: docs-site/docs/development/research/github-issue-bot-investigation.md

on:
  issues:
    types: [opened]

# Restrict default permissions — each job declares only what it needs
permissions: {}

jobs:
  triage-and-suggest:
    runs-on: ubuntu-latest
    # Run for issues labeled as bug OR enhancement
    if: >-
      contains(github.event.issue.labels.*.name, 'bug') ||
      contains(github.event.issue.labels.*.name, 'enhancement')
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          sparse-checkout: |
            .github/issue-bot/troubleshooting-index.json
            .github/issue-bot/issue-index.json
            .github/issue-bot/feature-index.json
          sparse-checkout-cone-mode: false

      - name: Phase 1 - Analyze missing information
        id: phase1
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const issueBody = context.payload.issue.body || '';
            const issueTitle = context.payload.issue.title || '';
            const issueUser = context.payload.issue.user.login;
            const labels = (context.payload.issue.labels || []).map((l) => l.name);
            const isBug = labels.includes('bug');
            const isEnhancement = labels.includes('enhancement');

            // Skip bot accounts
            if (issueUser.includes('[bot]') || issueUser.endsWith('-bot')) {
              console.log('Skipping bot account');
              core.setOutput('skip', 'true');
              return;
            }

            // Safety: check if bot already commented on this issue
            const { data: comments } =
              await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });

            const BOT_SIGNATURE =
              "I'm a bot that helps with issue triage";
            if (
              comments.some(
                (c) =>
                  c.user.type === 'Bot' &&
                  c.body.includes(BOT_SIGNATURE)
              )
            ) {
              console.log('Bot already commented on this issue. Skipping.');
              core.setOutput('skip', 'true');
              return;
            }

            core.setOutput('skip', 'false');
            core.setOutput('is_bug', isBug.toString());
            core.setOutput('is_enhancement', isEnhancement.toString());
            core.setOutput('current_label', isBug ? 'bug' : 'enhancement');

            // --- Section Parser ---
            // GitHub issue forms produce markdown with ### headers for each field.
            function getSection(body, header) {
              const escaped = header.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const regex = new RegExp(
                `### ${escaped}\\s*\\n([\\s\\S]*?)(?=\\n### |$)`
              );
              const match = body.match(regex);
              return match ? match[1].trim() : '';
            }

            // --- Content Analysis Helpers ---
            function stripFences(text) {
              return text.replace(/`{3,}[\w]*\n?/g, '').trim();
            }

            function isDefaultStepsTemplate(content) {
              if (!content || content === '_No response_') return true;
              const cleaned = stripFences(content);
              if (!cleaned) return true;
              const withoutMarkers = cleaned
                .replace(/^\s*\d+\.\s*/gm, '')
                .replace(/\.\.\./g, '')
                .trim();
              return withoutMarkers.length === 0;
            }

            function isDebugMissing(content) {
              if (!content || content === '_No response_') return true;
              const cleaned = stripFences(content);
              if (!cleaned) return true;
              const withoutDefaults = cleaned
                .replace(/^bash\s*$/gm, '')
                .replace(/^markdown\s*$/gm, '')
                .replace(
                  /ELECTRON_ENABLE_LOGGING=true\s+teams-for-linux\s+--logConfig='[^']*'/g,
                  ''
                )
                .trim();
              return withoutDefaults.length === 0;
            }

            const missingItems = [];

            // Bug-specific missing info checks
            if (isBug) {
              const canReproduce = getSection(
                issueBody,
                'Can you reproduce this bug on the Microsoft Teams web app (https://teams.microsoft.com)?'
              );
              const reproSteps = getSection(issueBody, 'Reproduction steps');
              const expectedBehavior = getSection(issueBody, 'Expected Behavior');
              const debugOutput = getSection(issueBody, 'Debug');

              if (isDefaultStepsTemplate(reproSteps)) {
                missingItems.push({
                  label: 'Reproduction steps',
                  detail:
                    'Step-by-step instructions to trigger the bug (the more specific, the faster we can investigate)',
                });
              }

              if (isDebugMissing(debugOutput)) {
                missingItems.push({
                  label: 'Debug console output',
                  detail:
                    'Log output from running the application with debug logging enabled',
                });
              }

              if (isDefaultStepsTemplate(expectedBehavior)) {
                missingItems.push({
                  label: 'Expected behavior',
                  detail:
                    'A description of what you expected to happen instead',
                });
              }

              const isPwaReproducible =
                canReproduce.toLowerCase().includes('yes');
              core.setOutput('is_pwa_reproducible', isPwaReproducible.toString());
            } else {
              core.setOutput('is_pwa_reproducible', 'false');
            }

            core.setOutput('missing_items_json', JSON.stringify(missingItems));
            core.setOutput('issue_title', issueTitle.substring(0, 200));
            core.setOutput('issue_body_truncated', issueBody.substring(0, 2000));

            console.log(`Phase 1: ${missingItems.length} missing items, bug: ${isBug}, enhancement: ${isEnhancement}`);

      - name: Phase 2 - Suggest solutions from documentation (bugs only)
        id: phase2
        if: steps.phase1.outputs.skip != 'true' && steps.phase1.outputs.is_bug == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ steps.phase1.outputs.issue_title }}
          ISSUE_BODY: ${{ steps.phase1.outputs.issue_body_truncated }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Skip if Gemini API key is not configured (forks)
            if (!process.env.GEMINI_API_KEY) {
              console.log('GEMINI_API_KEY not configured, skipping Phase 2');
              core.setOutput('suggestions_json', '[]');
              return;
            }

            // Read pre-processed troubleshooting index
            const indexPath = path.join(
              process.env.GITHUB_WORKSPACE,
              '.github',
              'issue-bot',
              'troubleshooting-index.json'
            );

            let sections;
            try {
              sections = JSON.parse(fs.readFileSync(indexPath, 'utf-8'));
            } catch (e) {
              console.log('Could not read troubleshooting index, skipping Phase 2');
              core.setOutput('suggestions_json', '[]');
              return;
            }

            // Use environment variables for untrusted input (avoids injection)
            const issueTitle = (process.env.ISSUE_TITLE || '').substring(0, 200);
            const issueBody = (process.env.ISSUE_BODY || '')
              .replace(/```[\s\S]*?```/g, '')
              .substring(0, 1500);

            // Build compact section summaries for the prompt
            const sectionSummaries = sections
              .map(
                (s, i) =>
                  `[${i}] ${s.title} (${s.category}): ${s.description.substring(0, 150)}`
              )
              .join('\n');

            const prompt = `You are a helpful assistant for the "Teams for Linux" open source project.
            Match this bug report against known issues from our documentation.

            KNOWN ISSUES:
            ${sectionSummaries}

            BUG REPORT:
            Title: ${issueTitle}
            Body: ${issueBody}

            Return a JSON array of 0-3 matches. Only include sections with a meaningful connection (shared symptoms, similar error, same component). Use humble language in the reason field ("appears similar", "might be related", "could be connected").

            Format: [{"index": 0, "reason": "This appears similar because...", "actionable_step": "Try clearing the cache..."}]

            If no sections match, return: []
            Respond with ONLY valid JSON, no other text.`;

            try {
              const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${process.env.GEMINI_API_KEY}`,
                {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: {
                      temperature: 0.3,
                      maxOutputTokens: 500,
                      responseMimeType: 'application/json',
                    },
                  }),
                }
              );

              if (!response.ok) {
                console.log(`Gemini API returned ${response.status}, skipping suggestions`);
                core.setOutput('suggestions_json', '[]');
                return;
              }

              const data = await response.json();
              const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '[]';
              // Extract JSON array from response, stripping any prose wrapping
              const arrayMatch = rawText.match(/\[[\s\S]*\]/);
              const suggestions = JSON.parse(arrayMatch ? arrayMatch[0] : '[]');

              // Validate structure and bounds
              const validated = suggestions
                .filter(
                  (s) =>
                    typeof s.index === 'number' &&
                    s.index >= 0 &&
                    s.index < sections.length &&
                    typeof s.reason === 'string' &&
                    typeof s.actionable_step === 'string'
                )
                .slice(0, 3)
                .map((s) => ({
                  index: s.index,
                  title: sections[s.index].title,
                  docUrl: sections[s.index].docUrl,
                  reason: s.reason.substring(0, 200),
                  actionable_step: s.actionable_step.substring(0, 200),
                }));

              core.setOutput('suggestions_json', JSON.stringify(validated));
              console.log(`Phase 2: ${validated.length} matching documentation sections`);
            } catch (error) {
              console.log(`Gemini API unavailable (Phase 2): ${error.message}`);
              core.setOutput('suggestions_json', '[]');
            }

      - name: Phase 3 - Detect potential duplicates (bugs only)
        id: phase3
        if: steps.phase1.outputs.skip != 'true' && steps.phase1.outputs.is_bug == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ steps.phase1.outputs.issue_title }}
          ISSUE_BODY: ${{ steps.phase1.outputs.issue_body_truncated }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Skip if Gemini API key is not configured (forks)
            if (!process.env.GEMINI_API_KEY) {
              console.log('GEMINI_API_KEY not configured, skipping Phase 3');
              core.setOutput('duplicates_json', '[]');
              return;
            }

            // Read pre-processed issue index
            const indexPath = path.join(
              process.env.GITHUB_WORKSPACE,
              '.github',
              'issue-bot',
              'issue-index.json'
            );

            let issues;
            try {
              issues = JSON.parse(fs.readFileSync(indexPath, 'utf-8'));
            } catch (e) {
              console.log('Could not read issue index, skipping Phase 3');
              core.setOutput('duplicates_json', '[]');
              return;
            }

            const currentIssueNumber = parseInt(process.env.ISSUE_NUMBER, 10);

            // Filter out the current issue from candidates
            const candidates = issues.filter(
              (i) => i.number !== currentIssueNumber
            );

            if (candidates.length === 0) {
              console.log('No candidate issues in index');
              core.setOutput('duplicates_json', '[]');
              return;
            }

            // Use environment variables for untrusted input (avoids injection)
            const issueTitle = (process.env.ISSUE_TITLE || '').substring(0, 200);
            const issueBody = (process.env.ISSUE_BODY || '')
              .replace(/```[\s\S]*?```/g, '')
              .substring(0, 1500);

            // Build compact issue summaries for the prompt
            const issueSummaries = candidates
              .map(
                (issue) =>
                  `[#${issue.number}] (${issue.state}) ${issue.title}: ${(issue.summary || '').substring(0, 120)}`
              )
              .join('\n');

            const prompt = `You are a helpful assistant for the "Teams for Linux" open source project.
            Compare this new issue against existing issues to find potential duplicates or closely related reports.

            EXISTING ISSUES:
            ${issueSummaries}

            NEW ISSUE:
            Title: ${issueTitle}
            Body: ${issueBody}

            Return a JSON array of 0-3 matches. Only include issues with a strong semantic connection (same bug, same feature request, clearly overlapping symptoms). Use humble language in the reason field ("might be related", "appears similar", "could be the same issue").

            For each match, estimate a similarity percentage (60-95). Only include matches above 60%.

            Format: [{"number": 123, "reason": "This might be related because...", "similarity": 75}]

            If no issues are similar, return: []
            Respond with ONLY valid JSON, no other text.`;

            try {
              const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${process.env.GEMINI_API_KEY}`,
                {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: {
                      temperature: 0.2,
                      maxOutputTokens: 400,
                      responseMimeType: 'application/json',
                    },
                  }),
                }
              );

              if (!response.ok) {
                console.log(`Gemini API returned ${response.status}, skipping duplicates`);
                core.setOutput('duplicates_json', '[]');
                return;
              }

              const data = await response.json();
              const rawText =
                data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '[]';
              // Extract JSON array from response, stripping any prose wrapping
              const arrayMatch = rawText.match(/\[[\s\S]*\]/);
              const duplicates = JSON.parse(arrayMatch ? arrayMatch[0] : '[]');

              // Validate structure and bounds
              const issueNumbers = new Set(candidates.map((i) => i.number));
              const validated = duplicates
                .filter(
                  (d) =>
                    typeof d.number === 'number' &&
                    issueNumbers.has(d.number) &&
                    typeof d.reason === 'string' &&
                    typeof d.similarity === 'number' &&
                    d.similarity >= 60 &&
                    d.similarity <= 100
                )
                .slice(0, 3)
                .map((d) => {
                  const issue = candidates.find(
                    (i) => i.number === d.number
                  );
                  return {
                    number: d.number,
                    title: issue.title,
                    state: issue.state,
                    reason: d.reason.substring(0, 200),
                    similarity: Math.round(d.similarity),
                    closed_at: issue.closed_at || null,
                    milestone: issue.milestone || null,
                  };
                });

              core.setOutput('duplicates_json', JSON.stringify(validated));
              console.log(
                `Phase 3: ${validated.length} potential duplicates found`
              );
            } catch (error) {
              console.log(
                `Gemini API unavailable (Phase 3): ${error.message}`
              );
              core.setOutput('duplicates_json', '[]');
            }

      - name: Phase 4a - Enhancement context and feasibility (enhancements only)
        id: phase4a
        if: steps.phase1.outputs.skip != 'true' && steps.phase1.outputs.is_enhancement == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ steps.phase1.outputs.issue_title }}
          ISSUE_BODY: ${{ steps.phase1.outputs.issue_body_truncated }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Skip if Gemini API key is not configured (forks)
            if (!process.env.GEMINI_API_KEY) {
              console.log('GEMINI_API_KEY not configured, skipping Phase 4a');
              core.setOutput('context_json', '[]');
              return;
            }

            // Read pre-processed feature index
            const indexPath = path.join(
              process.env.GITHUB_WORKSPACE,
              '.github',
              'issue-bot',
              'feature-index.json'
            );

            let features;
            try {
              features = JSON.parse(fs.readFileSync(indexPath, 'utf-8'));
            } catch (e) {
              console.log('Could not read feature index, skipping Phase 4a');
              core.setOutput('context_json', '[]');
              return;
            }

            // Use environment variables for untrusted input (avoids injection)
            const issueTitle = (process.env.ISSUE_TITLE || '').substring(0, 200);
            const issueBody = (process.env.ISSUE_BODY || '')
              .replace(/```[\s\S]*?```/g, '')
              .substring(0, 1500);

            // Build compact feature summaries for the prompt
            const featureSummaries = features
              .map(
                (f, i) =>
                  `[${i}] (${f.status}) ${f.topic}: ${(f.summary || '').substring(0, 120)}`
              )
              .join('\n');

            const prompt = `You are a helpful assistant for the "Teams for Linux" open source project.
            Match this enhancement request against our existing roadmap items, architecture decisions (ADRs), and research documents.

            EXISTING FEATURES/DECISIONS/RESEARCH:
            ${featureSummaries}

            ENHANCEMENT REQUEST:
            Title: ${issueTitle}
            Body: ${issueBody}

            Return a JSON array of 0-3 matches. Only include items with a meaningful connection to the enhancement request (same feature area, overlapping goals, related technical decisions).

            For each match, include:
            - "index": the item index number
            - "reason": a brief explanation using humble language ("appears related", "might be connected", "could be relevant")
            - "is_infeasible": true ONLY if the matched item has status "rejected" and the rejection reason clearly applies to this request. false otherwise.

            Format: [{"index": 0, "reason": "We've previously investigated this area...", "is_infeasible": false}]

            If no items match, return: []
            Respond with ONLY valid JSON, no other text.`;

            try {
              const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${process.env.GEMINI_API_KEY}`,
                {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: {
                      temperature: 0.3,
                      maxOutputTokens: 500,
                      responseMimeType: 'application/json',
                    },
                  }),
                }
              );

              if (!response.ok) {
                console.log(`Gemini API returned ${response.status}, skipping enhancement context`);
                core.setOutput('context_json', '[]');
                return;
              }

              const data = await response.json();
              const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '[]';
              // Extract JSON array from response, stripping any prose wrapping
              const arrayMatch = rawText.match(/\[[\s\S]*\]/);
              const matches = JSON.parse(arrayMatch ? arrayMatch[0] : '[]');

              // Validate structure and bounds
              const validated = matches
                .filter(
                  (m) =>
                    typeof m.index === 'number' &&
                    m.index >= 0 &&
                    m.index < features.length &&
                    typeof m.reason === 'string'
                )
                .slice(0, 3)
                .map((m) => ({
                  index: m.index,
                  topic: features[m.index].topic,
                  status: features[m.index].status,
                  doc_url: features[m.index].doc_url,
                  source: features[m.index].source,
                  last_updated: features[m.index].last_updated || null,
                  reason: m.reason.substring(0, 200),
                  is_infeasible: m.is_infeasible === true && features[m.index].status === 'rejected',
                }));

              core.setOutput('context_json', JSON.stringify(validated));
              console.log(`Phase 4a: ${validated.length} matching features/ADRs/research docs`);
            } catch (error) {
              console.log(`Gemini API unavailable (Phase 4a): ${error.message}`);
              core.setOutput('context_json', '[]');
            }

      - name: Phase 4b - Misclassification detection (bugs and enhancements)
        id: phase4b
        if: steps.phase1.outputs.skip != 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ steps.phase1.outputs.issue_title }}
          ISSUE_BODY: ${{ steps.phase1.outputs.issue_body_truncated }}
          CURRENT_LABEL: ${{ steps.phase1.outputs.current_label }}
        with:
          script: |
            // Skip if Gemini API key is not configured (forks)
            if (!process.env.GEMINI_API_KEY) {
              console.log('GEMINI_API_KEY not configured, skipping Phase 4b');
              core.setOutput('misclassification_json', '{}');
              return;
            }

            // Use environment variables for untrusted input (avoids injection)
            const issueTitle = (process.env.ISSUE_TITLE || '').substring(0, 200);
            const issueBody = (process.env.ISSUE_BODY || '')
              .replace(/```[\s\S]*?```/g, '')
              .substring(0, 1500);
            const currentLabel = process.env.CURRENT_LABEL || '';

            const prompt = `You are a classification assistant for the "Teams for Linux" open source project.

            Classify this GitHub issue as one of: bug, enhancement, or question.

            ISSUE:
            Title: ${issueTitle}
            Body: ${issueBody}

            Current label: ${currentLabel}

            Classification rules:
            - "bug": Something that used to work and broke, a crash, an error, unexpected behavior, a regression
            - "enhancement": A new feature request, an improvement to existing functionality, a UI change suggestion
            - "question": A how-to question, a request for help or documentation

            Return a JSON object with:
            - "classification": one of "bug", "enhancement", "question"
            - "confidence": a number from 0-100 indicating how confident you are
            - "reason": a brief explanation (1 sentence) of why you chose this classification

            Format: {"classification": "bug", "confidence": 85, "reason": "The issue describes something that stopped working after an update."}
            Respond with ONLY valid JSON, no other text.`;

            try {
              const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${process.env.GEMINI_API_KEY}`,
                {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: {
                      temperature: 0.15,
                      maxOutputTokens: 200,
                      responseMimeType: 'application/json',
                    },
                  }),
                }
              );

              if (!response.ok) {
                console.log(`Gemini API returned ${response.status}, skipping misclassification`);
                core.setOutput('misclassification_json', '{}');
                return;
              }

              const data = await response.json();
              const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '{}';
              // Extract JSON object from response, stripping any prose wrapping
              const objMatch = rawText.match(/\{[\s\S]*\}/);
              const result = JSON.parse(objMatch ? objMatch[0] : '{}');

              // Validate structure
              const validClasses = ['bug', 'enhancement', 'question'];
              if (
                !validClasses.includes(result.classification) ||
                typeof result.confidence !== 'number' ||
                typeof result.reason !== 'string'
              ) {
                console.log('Invalid classification result, skipping');
                core.setOutput('misclassification_json', '{}');
                return;
              }

              // Only surface if classification disagrees AND confidence >= 80
              if (
                result.classification !== currentLabel &&
                result.confidence >= 80
              ) {
                const output = {
                  suggested_label: result.classification,
                  confidence: Math.round(result.confidence),
                  reason: result.reason.substring(0, 200),
                };
                core.setOutput('misclassification_json', JSON.stringify(output));
                console.log(`Phase 4b: Misclassification detected — suggested: ${output.suggested_label} (${output.confidence}% confidence)`);
              } else {
                core.setOutput('misclassification_json', '{}');
                console.log(`Phase 4b: No misclassification (classified as ${result.classification}, confidence ${result.confidence}%)`);
              }
            } catch (error) {
              console.log(`Gemini API unavailable (Phase 4b): ${error.message}`);
              core.setOutput('misclassification_json', '{}');
            }

      - name: Post consolidated comment
        if: steps.phase1.outputs.skip != 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          IS_BUG: ${{ steps.phase1.outputs.is_bug }}
          IS_ENHANCEMENT: ${{ steps.phase1.outputs.is_enhancement }}
          MISSING_ITEMS_JSON: ${{ steps.phase1.outputs.missing_items_json }}
          IS_PWA_REPRODUCIBLE: ${{ steps.phase1.outputs.is_pwa_reproducible }}
          SUGGESTIONS_JSON: ${{ steps.phase2.outputs.suggestions_json }}
          DUPLICATES_JSON: ${{ steps.phase3.outputs.duplicates_json }}
          CONTEXT_JSON: ${{ steps.phase4a.outputs.context_json }}
          MISCLASSIFICATION_JSON: ${{ steps.phase4b.outputs.misclassification_json }}
        with:
          script: |
            const isBug = process.env.IS_BUG === 'true';
            const isEnhancement = process.env.IS_ENHANCEMENT === 'true';
            const missingItems = JSON.parse(process.env.MISSING_ITEMS_JSON || '[]');
            const isPwaReproducible = process.env.IS_PWA_REPRODUCIBLE === 'true';
            const suggestions = JSON.parse(process.env.SUGGESTIONS_JSON || '[]');
            const duplicates = JSON.parse(process.env.DUPLICATES_JSON || '[]');
            const contextMatches = JSON.parse(process.env.CONTEXT_JSON || '[]');

            let misclassification = {};
            try {
              misclassification = JSON.parse(process.env.MISCLASSIFICATION_JSON || '{}');
            } catch (e) {
              misclassification = {};
            }
            const hasMisclassification = !!misclassification.suggested_label;

            // Skip if nothing to report
            if (
              missingItems.length === 0 &&
              !isPwaReproducible &&
              suggestions.length === 0 &&
              duplicates.length === 0 &&
              contextMatches.length === 0 &&
              !hasMisclassification
            ) {
              console.log('Nothing to report. No comment needed.');
              return;
            }

            const parts = [];

            if (isBug) {
              parts.push('👋 Thanks for reporting this issue!\n');
            } else {
              parts.push('👋 Thanks for the feature suggestion!\n');
            }

            // --- Bug-specific sections ---

            // PWA reproducibility note (bugs only)
            if (isBug && isPwaReproducible) {
              parts.push(
                '> **Note:** You mentioned this bug also occurs on the [Microsoft Teams web app](https://teams.microsoft.com). ' +
                  'This suggests the issue may be with Microsoft Teams itself rather than Teams for Linux. ' +
                  'You could also report it to [Microsoft Feedback Portal](https://feedbackportal.microsoft.com/). ' +
                  "That said, we'll still take a look — there may be something we can do on our end.\n"
              );
            }

            // Solution suggestions from Phase 2 (bugs only)
            if (isBug && suggestions.length > 0) {
              parts.push('**This might be related to a known issue:**\n');
              for (const s of suggestions) {
                parts.push(
                  `- [${s.title}](${s.docUrl}) — ${s.reason} ${s.actionable_step}\n`
                );
              }
              parts.push(
                '> These suggestions are based on our documentation and may not be exact matches.\n'
              );
            }

            // Duplicate suggestions from Phase 3 (bugs only)
            if (isBug && duplicates.length > 0) {
              const openDups = duplicates.filter(
                (d) => d.state === 'open'
              );
              const closedDups = duplicates.filter(
                (d) => d.state === 'closed'
              );

              parts.push(
                '**This issue might be related to existing discussions:**\n'
              );

              if (openDups.length > 0) {
                parts.push('*Potentially related open issues:*');
                for (const d of openDups) {
                  parts.push(
                    `- #${d.number} — "${d.title}" (${d.similarity}% similar) — ${d.reason}`
                  );
                }
                parts.push('');
              }

              if (closedDups.length > 0) {
                parts.push(
                  '*Recently resolved issues that could be relevant:*'
                );
                for (const d of closedDups) {
                  const resolvedNote = d.milestone
                    ? `Resolved in ${d.milestone}`
                    : 'Resolved';
                  parts.push(
                    `- #${d.number} — "${d.title}" (${resolvedNote}) — ${d.reason}`
                  );
                }
                parts.push('');
              }

              parts.push(
                '> If one of these matches your issue, consider adding your details there instead.\n'
              );
            }

            // --- Enhancement-specific sections ---

            // Enhancement context from Phase 4a (enhancements only)
            if (isEnhancement && contextMatches.length > 0) {
              const statusLabels = {
                shipped: 'Shipped',
                planned: 'Planned',
                investigating: 'Under investigation',
                deferred: 'Deferred / awaiting feedback',
                rejected: 'Previously explored',
              };

              parts.push(
                "**We've previously explored related areas:**\n"
              );

              for (const ctx of contextMatches) {
                const statusLabel = statusLabels[ctx.status] || ctx.status;
                const sourceLabel = ctx.source === 'adr' ? 'Architecture Decision'
                  : ctx.source === 'research' ? 'Research'
                  : 'Roadmap';
                const updatedNote = ctx.last_updated
                  ? ` (last updated: ${ctx.last_updated})`
                  : '';

                if (ctx.is_infeasible) {
                  parts.push(
                    `- [${ctx.topic}](${ctx.doc_url}) (${sourceLabel}) — We explored this and documented our findings.${updatedNote} ${ctx.reason}`
                  );
                } else {
                  parts.push(
                    `- [${ctx.topic}](${ctx.doc_url}) (${sourceLabel}, ${statusLabel})${updatedNote} — ${ctx.reason}`
                  );
                }
              }

              parts.push('');
              parts.push(
                '> Our roadmap is a living document and priorities may have changed. Your feedback helps shape future development.\n'
              );
            }

            // --- Common sections ---

            // Missing information checklist (bugs only for now)
            if (missingItems.length > 0) {
              parts.push(
                'To help us investigate, could you provide some additional details?\n'
              );
              parts.push('**Missing information:**');
              for (const item of missingItems) {
                parts.push(
                  `- [ ] **${item.label}** — ${item.detail}`
                );
              }
              parts.push('');
            }

            // Debug instructions (collapsible, bugs only)
            if (
              missingItems.some(
                (i) => i.label === 'Debug console output'
              )
            ) {
              parts.push(
                '<details>\n' +
                  '<summary><b>How to get debug logs</b></summary>\n\n' +
                  '1. Run the application from the terminal with logging enabled:\n' +
                  '   ```bash\n' +
                  "   ELECTRON_ENABLE_LOGGING=true teams-for-linux --logConfig='{\"transports\":{\"console\":{\"level\":\"debug\"}}}'\n" +
                  '   ```\n' +
                  '2. Reproduce the issue\n' +
                  '3. Copy the relevant console output\n' +
                  '4. Feel free to redact any sensitive information (emails, URLs, etc.)\n\n' +
                  '</details>\n'
              );
            }

            // Misclassification hint (bugs and enhancements)
            if (hasMisclassification) {
              const labelHint = misclassification.suggested_label === 'bug'
                ? 'a bug report'
                : misclassification.suggested_label === 'enhancement'
                  ? 'a feature request'
                  : 'a question';
              parts.push(
                `> **Label suggestion:** This might be ${labelHint} rather than what it's currently labelled as. ` +
                  `${misclassification.reason} ` +
                  `Re-labelling as \`${misclassification.suggested_label}\` would help us apply the right triage process.\n`
              );
            }

            // Tip link
            if (isBug) {
              parts.push(
                '> **Tip:** You might also find helpful information in our ' +
                  '[Troubleshooting Guide](https://ismaelmartinez.github.io/teams-for-linux/troubleshooting).\n'
              );
            } else {
              parts.push(
                '> **Tip:** Check our [Development Roadmap](https://ismaelmartinez.github.io/teams-for-linux/development/plan/roadmap) ' +
                  'for the current project direction and planned features.\n'
              );
            }

            // Bot disclosure
            parts.push('---\n');
            parts.push(
              "*I'm a bot that helps with issue triage. " +
                'Suggestions are based on documentation and may not be exact. ' +
                'A maintainer will review this issue.*'
            );

            const commentBody = parts.join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody,
            });

            const contextCount = contextMatches.length;
            const misclassNote = hasMisclassification
              ? `, misclassification: ${misclassification.suggested_label}`
              : '';
            console.log(
              `Posted comment (missing: ${missingItems.length}, suggestions: ${suggestions.length}, duplicates: ${duplicates.length}, context: ${contextCount}${misclassNote}, PWA: ${isPwaReproducible})`
            );
