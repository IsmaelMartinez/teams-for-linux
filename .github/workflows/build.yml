name: Build & Release

env:
  GH_TOKEN: ${{ SECRETS.GITHUB_TOKEN }}

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# Restrict default permissions — each job declares only what it needs
permissions: {}

defaults:
  run:
    shell: bash

jobs:
  lint_and_audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Node.js and NPM
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Check config docs are in sync
        run: |
          npm run generate-config-docs
          if ! git diff --quiet -- docs-site/docs/configuration-generated.md docs-site/static/config-schema.json; then
            echo "::error::Generated config docs are out of sync with app/config/options.js. Run 'npm run generate-config-docs' and commit the result."
            git diff -- docs-site/docs/configuration-generated.md docs-site/static/config-schema.json
            exit 1
          fi

      - name: Audit dependencies
        run: npm audit --audit-level=critical

  e2e_tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Node.js and NPM
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Electron binary
        # Electron's bundled extract-zip deterministically unpacks only one
        # file from the (complete, checksum-verified) zip in the current CI
        # image, leaving dist with no binary and no path.txt, which breaks
        # electron.launch() in the e2e tests. Download via @electron/get as
        # usual, then extract the cached zip with the system unzip — an
        # independent extractor — and write path.txt ourselves.
        env:
          DEBUG: "@electron/get:*"
        run: |
          set -euo pipefail
          rm -rf node_modules/electron/dist node_modules/electron/path.txt "$HOME/.cache/electron"
          # Populate the (checksum-verified) zip in the cache. The bundled
          # extraction fails here, so ignore its exit status.
          force_no_cache=true node node_modules/electron/install.js || true
          zip=$(find "$HOME/.cache/electron" -name 'electron-*.zip' | head -1)
          if [ -z "$zip" ]; then
            echo "::error::Electron zip was not downloaded"
            exit 1
          fi
          echo "Extracting $(stat -c%s "$zip") bytes from $zip"
          rm -rf node_modules/electron/dist
          mkdir -p node_modules/electron/dist
          unzip -q -o "$zip" -d node_modules/electron/dist
          chmod +x node_modules/electron/dist/electron
          printf electron > node_modules/electron/path.txt
          if [ ! -x node_modules/electron/dist/electron ]; then
            echo "::error::Electron binary missing after unzip"
            ls -laR node_modules/electron/dist | head -40
            exit 1
          fi
          echo "OK: electron binary installed ($(stat -c%s node_modules/electron/dist/electron) bytes)"

      - name: Run unit tests
        run: npm run test:unit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npm run test:e2e

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7

  linux_x64:
    needs: [lint_and_audit]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Node.js and NPM
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Build
        run: npm ci

      - name: Validate Release Notes
        run: npm run generate-release-info

      - name: Build for Release
        if: github.ref == 'refs/heads/main'
        run: npm run dist:linux:x64 -- --publish always

      - name: Build for PR
        if: github.ref != 'refs/heads/main'
        run: npm run dist:linux:x64 -- --publish never

      - name: Upload PR artifacts
        if: github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: teams-for-linux-linux-x64
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
            dist/*.AppImage
          retention-days: 30
          compression-level: 6

