name: Update Feature Index

# Regenerates the feature-index.json file used by the issue triage bot (Phase 4)
# to provide enhancement context from roadmap, ADRs, and research documents.
# Parses local markdown files — no external API calls needed.
#
# Triggers:
#   - Weekly rebuild (Monday 4:30 UTC, offset from issue index at 4:00)
#   - Manual dispatch for testing
#
# See: docs-site/docs/development/research/github-issue-bot-investigation.md

on:
  schedule:
    - cron: '30 4 * * 1' # Weekly, Monday at 4:30 UTC
  workflow_dispatch: # Manual trigger for testing

# Only one index update at a time
concurrency:
  group: update-feature-index
  cancel-in-progress: true

# Restrict default permissions — each job declares only what it needs
permissions: {}

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 0 # Full history needed for git log dates

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '22'

      - name: Generate feature index
        run: node .github/issue-bot/scripts/generate-feature-index.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/issue-bot/feature-index.json
          git diff --staged --quiet || git commit -m "chore: update feature index for enhancement triage"
          git push
