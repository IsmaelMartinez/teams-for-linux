name: Update Feature Index (Disabled)

# DISABLED: Migrated to standalone GitHub App at
# https://github.com/IsmaelMartinez/github-issue-triage-bot
# The standalone service manages its own feature index in Neon PostgreSQL.
# Safe to delete once the GitHub App is confirmed working.
#
# See: docs-site/docs/development/research/github-issue-bot-investigation.md

on:
  workflow_dispatch: # Keep manual trigger only, for emergency use

# Only one index update at a time
concurrency:
  group: update-feature-index
  cancel-in-progress: true

# Restrict default permissions — each job declares only what it needs
permissions: {}

jobs:
  update-index:
    # Disabled — migrated to GitHub App
    if: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 0 # Full history needed for git log dates

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '22'

      - name: Generate feature index
        run: node .github/issue-bot/scripts/generate-feature-index.js

      - name: Create PR if index changed
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
          commit-message: 'chore: update feature index for enhancement triage'
          title: 'chore: update feature index for enhancement triage'
          body: |
            Automated update of `.github/issue-bot/feature-index.json` for the
            triage bot's enhancement context matching (Phase 4a).
          branch: chore/update-feature-index
          add-paths: .github/issue-bot/feature-index.json
          delete-branch: true
