# Dependabot configuration for automated dependency update PRs
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # npm dependencies — weekly, grouped minor/patch to reduce PR noise
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 10
    ignore:
      # electron-builder is pinned to the known-good 26.8.1, which builds on
      # both snap and the windows-2025 runner. 26.15.0+ rewrote the snap build
      # into pure-TS and broke snap launch (#2684: command.sh sources a missing
      # desktop-init.sh). 26.14.0's bundled node-gyp cannot find Visual Studio on
      # windows-2025, breaking the exe build; 26.9-26.13 are unverified. Stay on
      # 26.8.x until the snap build migrates to core24 (#2590).
      - dependency-name: "electron-builder"
        versions: [">=26.9.0"]

  # npm dependencies for docs site
  - package-ecosystem: "npm"
    directory: "/docs-site"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 5

  # GitHub Actions — monthly, check for new action versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
