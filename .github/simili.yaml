# simili-bot configuration for teams-for-linux.
# Trial mode: similarity-only — post related-issue suggestions without labelling
# or closing. Runs alongside ismael-triage-bot. Trial window 2026-04-20 → 2026-05-20.
# See docs in the triage-bot repo: docs/plans/2026-04-16-simili-bot-trial.md
#
# Secrets required on this repo (Settings → Secrets and variables → Actions):
#   GEMINI_API_KEY   reuse the same key the triage bot uses
#   QDRANT_URL       Qdrant Cloud instance URL (https://...)
#   QDRANT_API_KEY   Qdrant Cloud API key

# Use an explicit `steps:` list instead of `workflow: similarity-only`.
# The pinned simili-bot version reads cfg.Workflow from this file but never
# applies it — the process command's --workflow flag wins and defaults to
# `issue-triage`, which is why the first trial weeks saw duplicate callouts,
# quality scores, and 72-hour auto-close countdowns despite the trial plan
# calling for similarity-only output. cfg.Steps is checked first by
# ResolveSteps, so listing the steps directly bypasses the broken workflow
# handling. Kept in sync with the upstream `similarity-only` preset:
#   https://github.com/similigh/simili-bot/blob/main/internal/core/pipeline/registry.go
steps:
  - gatekeeper
  - vectordb_prep
  - similarity_search
  - response_builder
  - action_executor
  - indexer

qdrant:
  url: "${QDRANT_URL}"
  api_key: "${QDRANT_API_KEY}"
  collection: "teams-for-linux-issues"

embedding:
  provider: "gemini"
  api_key: "${GEMINI_API_KEY}"
  model: "gemini-embedding-001"
  dimensions: 3072

llm:
  provider: "gemini"
  api_key: "${GEMINI_API_KEY}"
  model: "gemini-2.5-flash"

defaults:
  # Start at the tool's recommended threshold per the trial plan. Re-evaluate
  # at the first weekly review if precision/noise metrics miss the targets.
  similarity_threshold: 0.65
  max_similar_to_show: 5
  duplicate_candidates: 5
