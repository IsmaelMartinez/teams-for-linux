# Cross-Distro Testing for Teams for Linux
# 4 distros x 3 display servers = 12 test configurations
#
# Usage:
#   docker compose up ubuntu-x11          # Single config
#   docker compose up ubuntu-x11 fedora-wayland  # Multiple configs
#
# Access via browser: http://localhost:<noVNC_PORT>/vnc.html
# Access via VNC client: localhost:<VNC_PORT>

x-common: &common
  shm_size: "2gb"
  security_opt:
    - seccomp=unconfined
  cap_add:
    - SYS_PTRACE
  volumes:
    - ./app:/app:ro
  environment: &common-env
    SCREEN_RESOLUTION: "1920x1080x24"

# ============================================================
# Ubuntu 24.04
# ============================================================
services:
  ubuntu-x11:
    <<: *common
    build:
      context: .
      dockerfile: dockerfiles/ubuntu.Dockerfile
    environment:
      <<: *common-env
      DISPLAY_SERVER: x11
    ports:
      - "6081:6080"
      - "5901:5900"

  ubuntu-wayland:
    <<: *common
    build:
      context: .
      dockerfile: dockerfiles/ubuntu.Dockerfile
    environment:
      <<: *common-env
      DISPLAY_SERVER: wayland
    ports:
      - "6082:6080"
      - "5902:5900"

  ubuntu-xwayland:
    <<: *common
    build:
      context: .
      dockerfile: dockerfiles/ubuntu.Dockerfile
    environment:
      <<: *common-env
      DISPLAY_SERVER: xwayland
    ports:
      - "6083:6080"
      - "5903:5900"

